<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Online Experience</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #f5f7fa, #c3cfe2);
            color: #333;
        }
        h1 {
            text-align: center;
            background: linear-gradient(90deg, #ff6b6b, #f06595);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3em;
            margin-top: 20px;
        }
        .feature-card {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }
        .feature-card:hover {
            transform: scale(1.05);
        }
        .statistics {
            text-align: center;
            font-size: 1.5em;
            margin: 40px 0;
        }
        .floating-icon {
            position: absolute;
            width: 50px;
            transition: all 0.5s;
        }
        .icon-1 { top: 10%; left: 10%; }
        .icon-2 { bottom: 10%; right: 10%; }
        .icon-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <h1>Welcome to Our Enhanced Online Experience</h1>
    <div class="statistics">
        <p>Users: 10,000+</p>
        <p>Projects: 500+</p>
        <p>Contributors: 200+</p>
    </div>
    <div class="feature-card">Feature 1</div>
    <div class="feature-card">Feature 2</div>
    <div class="feature-card">Feature 3</div>
    <img src="book-icon.png" class="floating-icon icon-1">
    <img src="book-icon.png" class="floating-icon icon-2">
    <img src="book-icon.png" class="floating-icon icon-3">
</body>
</html>
